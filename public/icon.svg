<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>
  <g fill="url(#accent)">
    <!-- Down arrow shaft -->
    <rect x="224" y="110" width="64" height="170" rx="12"/>
    <!-- Arrow head (aligned with shaft edges) -->
    <polygon points="256,355 155,260 224,260 224,280 288,280 288,260 357,260"/>
    <!-- Base line -->
    <rect x="145" y="375" width="222" height="36" rx="18"/>
  </g>
</svg>
